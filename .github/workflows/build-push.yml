name: Build and push installer image

on:
  push:
    branches: [main]
    paths:
      - 'fork/**'
      - 'Dockerfile'
      - '.github/workflows/build-push.yml'
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/soradgaming/openpilot-installer:latest
            ghcr.io/soradgaming/openpilot-installer:${{ github.sha }}